<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>miCunda — Página no encontrada</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=VT323&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100dvh;
      display: flex; align-items: center; justify-content: center;
      background: #1a4a8a;
      font-family: 'Oswald', sans-serif;
      padding: 24px;
    }
    .card {
      background: #EDE8DF;
      border: 3px solid #B8A888;
      box-shadow: 6px 6px 0 rgba(0,0,0,.3);
      padding: 40px 32px 36px;
      text-align: center;
      max-width: 360px;
      width: 100%;
    }
    .card img {
      width: 110px;
      image-rendering: pixelated;
      margin-bottom: 20px;
    }
    .code {
      font-family: 'VT323', monospace;
      font-size: 22px;
      color: #D4520A;
      letter-spacing: 3px;
      margin-bottom: 10px;
    }
    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px;
      letter-spacing: 4px;
      color: #1a4a8a;
      margin-bottom: 16px;
      line-height: 1.1;
    }
    p {
      font-size: 15px;
      color: #4A3F2F;
      line-height: 1.6;
      margin-bottom: 28px;
    }
    p strong { color: #1a4a8a; }
    .btn {
      display: inline-block;
      background: #D4520A;
      color: #fff;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      letter-spacing: 3px;
      padding: 14px 36px;
      border: none;
      box-shadow: 4px 4px 0 #7A2A00;
      cursor: pointer;
      text-decoration: none;
      transition: transform .1s, box-shadow .1s;
    }
    .btn:active { transform: translate(2px,2px); box-shadow: 2px 2px 0 #7A2A00; }
  </style>
</head>
<body>
  <div class="card">
    <img src="icons/icon_retro_html_404.png" alt="miCunda 404">
    <div class="code">ERROR 404</div>
    <h1>Página no encontrada</h1>
    <p>
      Si tenías la app instalada en el móvil, desinstálala, abre
      <strong>micunda.es</strong> desde tu navegador y vuelve a instalarla.
    </p>
    <a href="https://www.micunda.es" class="btn">Ir a miCunda</a>
  </div>
</body>
</html>
